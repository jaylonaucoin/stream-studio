<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube to MP3 Converter</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>YouTube to MP3 Converter</h1>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        ⚙️
      </button>
    </header>

    <main class="main-content">
      <div class="input-section">
        <div class="url-input-wrapper">
          <input type="text" id="urlInput" class="url-input" placeholder="Paste YouTube URL here or drag & drop..."
            autocomplete="off" />
          <button id="pasteBtn" class="paste-btn">Paste</button>
        </div>
        <div class="button-group">
          <button id="convertBtn" class="btn btn-primary">Convert</button>
          <button id="cancelBtn" class="btn btn-secondary" disabled>Cancel</button>
        </div>
      </div>

      <div class="progress-section">
        <div id="progressBar" class="progress-bar" style="display: none;">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressText" class="progress-text"></div>
        <div id="statusLog" class="status-log"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="output-section">
        <label for="outputFolder" class="output-label">Output Folder:</label>
        <div class="output-folder-wrapper">
          <span id="outputFolderPath" class="output-folder-path">Downloads</span>
          <button id="chooseFolderBtn" class="btn btn-small">Choose Folder</button>
        </div>
      </div>
      <div id="lastConverted" class="last-converted" style="display: none;">
        <a id="lastConvertedLink" href="#" class="last-converted-link">Open Last Converted File</a>
      </div>
    </footer>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <h2 id="errorTitle">Error</h2>
      <p id="errorMessage"></p>
      <button id="errorCloseBtn" class="btn btn-primary">OK</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
